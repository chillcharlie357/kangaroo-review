# Include these locations in the docs.cpl.icu server block.

location = /kangaroo-review {
    return 301 /kangaroo-review/;
}

location ^~ /kangaroo-review/api/ {
    proxy_pass http://127.0.0.1:18081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /kangaroo-review/ {
    alias /home/docs/kangaroo-review/;
    index index.html;
    try_files $uri $uri/ /kangaroo-review/index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma no-cache;
    add_header Expires 0;
}
