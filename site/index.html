<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>软件体系结构复习资料</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#overview" aria-label="Back to overview">
        <span class="eyebrow">Software Architecture</span>
        <strong id="page-title">软件体系结构复习资料</strong>
      </a>

      <div class="toolbar" aria-label="Study controls">
        <div class="segmented" role="group" aria-label="Language mode">
          <button class="seg active" data-lang="mix" type="button">中英</button>
          <button class="seg" data-lang="zh" type="button">中文</button>
          <button class="seg" data-lang="en" type="button">EN</button>
        </div>
        <label class="search">
          <span>Search</span>
          <input id="search-input" type="search" placeholder="ASR / DDD / 质量属性" />
        </label>
      </div>
    </header>

    <main class="layout">
      <aside class="rail">
        <nav class="page-nav" aria-label="Review pages">
          <a href="#overview" class="nav-link active" data-page="overview">总览</a>
          <a href="#plan" class="nav-link" data-page="plan">路线</a>
          <a href="#knowledge" class="nav-link" data-page="knowledge">知识库</a>
          <a href="#papers" class="nav-link" data-page="papers">真题</a>
          <a href="#glossary" class="nav-link" data-page="glossary">术语</a>
          <a href="#whiteboards" class="nav-link" data-page="whiteboards">画板</a>
          <a href="#sources" class="nav-link" data-page="sources">资料库</a>
        </nav>

        <div class="rail-filter" aria-label="Priority filter">
          <span>Priority</span>
          <div class="priority-filter" role="group" aria-label="Priority filter">
            <button class="chip active" data-priority="all" type="button">All</button>
            <button class="chip" data-priority="P0" type="button">P0</button>
            <button class="chip" data-priority="P1" type="button">P1</button>
            <button class="chip" data-priority="P2" type="button">P2</button>
          </div>
        </div>
      </aside>

      <section id="app-view" class="workspace" aria-live="polite"></section>
    </main>

    <div id="modal-root" class="modal-root" hidden></div>

    <script src="content.js"></script>
    <script src="data/questions.js"></script>
    <script src="data/sources.js"></script>
    <script src="app.js"></script>
  </body>
</html>
