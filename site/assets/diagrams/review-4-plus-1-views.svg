<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Kruchten 4+1 View Model</title>
  <desc id="desc">Four architecture views surround use case scenarios: logical, process, development, and physical views.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f5d75"/>
    </marker>
    <style>
      .bg{fill:#fbfaf7}
      .card{fill:#fff;stroke:#c7d0dc;stroke-width:2.5;rx:18}
      .core{fill:#f6eadf;stroke:#c5533d;stroke-width:3}
      .title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2733}
      .label{font:700 25px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2733}
      .en{font:600 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#c5533d}
      .body{font:18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4f5d75}
      .note{font:16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#6b7686}
      .line{stroke:#4f5d75;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1180" height="760"/>
  <text class="title" x="590" y="70" text-anchor="middle">P. Kruchten's 4+1 View Model</text>
  <text class="note" x="590" y="105" text-anchor="middle">Use cases / scenarios capture architectural requirements and connect more than one view.</text>

  <rect class="card" x="90" y="145" width="420" height="185"/>
  <text class="label" x="125" y="190">Logical view</text>
  <text class="en" x="125" y="220">逻辑视图</text>
  <text class="body" x="125" y="258">Architecturally significant elements</text>
  <text class="body" x="125" y="286">and relationships between them.</text>

  <rect class="card" x="670" y="145" width="420" height="185"/>
  <text class="label" x="705" y="190">Process view</text>
  <text class="en" x="705" y="220">进程视图</text>
  <text class="body" x="705" y="258">Concurrency, runtime processes,</text>
  <text class="body" x="705" y="286">threads, and communication.</text>

  <rect class="card" x="90" y="455" width="420" height="185"/>
  <text class="label" x="125" y="500">Development view</text>
  <text class="en" x="125" y="530">开发视图</text>
  <text class="body" x="125" y="568">Internal organization of software</text>
  <text class="body" x="125" y="596">components, packages, and artifacts.</text>

  <rect class="card" x="670" y="455" width="420" height="185"/>
  <text class="label" x="705" y="500">Physical view</text>
  <text class="en" x="705" y="530">物理视图</text>
  <text class="body" x="705" y="568">Mapping major processes/components</text>
  <text class="body" x="705" y="596">to hardware and environment.</text>

  <circle class="core" cx="590" cy="380" r="105"/>
  <text class="label" x="590" y="365" text-anchor="middle">+1</text>
  <text class="en" x="590" y="398" text-anchor="middle">Use case scenarios</text>
  <text class="note" x="590" y="426" text-anchor="middle">验证并串联四个视图</text>

  <path class="line" d="M 510 238 C 555 250 575 280 585 300"/>
  <path class="line" d="M 670 238 C 625 250 605 280 595 300"/>
  <path class="line" d="M 510 548 C 555 520 575 488 585 462"/>
  <path class="line" d="M 670 548 C 625 520 605 488 595 462"/>

  <text class="note" x="590" y="710" text-anchor="middle">复习关键词：不同 stakeholder 看不同 view；用 scenario 检查视图之间是否一致。</text>
</svg>
