<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1100" viewBox="0 0 1680 1100" role="img" aria-labelledby="title desc">
  <title id="title">Quality attribute scenario examples</title>
  <desc id="desc">A redraw of the course review quality attribute scenario table with source, stimulus, artifact, environment, response and response measure.</desc>
  <defs>
    <style>
      .bg{fill:#fffdf8}
      .head{fill:#f4ede2}
      .alt{fill:#e5e0d8}
      .line{stroke:#282828;stroke-width:1.2}
      .title{font:700 34px Georgia,"Times New Roman",serif;fill:#1f2328}
      .small{font:600 16px "Avenir Next","PingFang SC","Noto Sans CJK SC",sans-serif;fill:#667078}
      .th{font:700 28px "Kaiti SC","STKaiti","Songti SC",serif;fill:#d51f1f}
      .attr{font:700 26px Georgia,"Times New Roman",serif;fill:#d51f1f}
      .cell{font:400 24px "Kaiti SC","STKaiti","Songti SC",serif;fill:#d51f1f}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1680" height="1100"/>
  <text class="title" x="40" y="52">质量属性场景六要素 / Quality Attribute Scenario Template</text>
  <text class="small" x="40" y="82">Grounded in the course review table: each answer must include Source, Stimulus, Artifact, Environment, Response and Response Measure.</text>

  <g transform="translate(28 112)">
    <rect class="head line" x="0" y="0" width="1624" height="56"/>
    <rect class="alt line" x="0" y="56" width="1624" height="112"/>
    <rect class="bg line" x="0" y="168" width="1624" height="150"/>
    <rect class="alt line" x="0" y="318" width="1624" height="112"/>
    <rect class="bg line" x="0" y="430" width="1624" height="112"/>
    <rect class="alt line" x="0" y="542" width="1624" height="178"/>
    <rect class="bg line" x="0" y="720" width="1624" height="112"/>
    <rect class="alt line" x="0" y="832" width="1624" height="112"/>

    <g class="line">
      <line x1="250" y1="0" x2="250" y2="944"/>
      <line x1="480" y1="0" x2="480" y2="944"/>
      <line x1="680" y1="0" x2="680" y2="944"/>
      <line x1="860" y1="0" x2="860" y2="944"/>
      <line x1="1040" y1="0" x2="1040" y2="944"/>
      <line x1="1400" y1="0" x2="1400" y2="944"/>
    </g>

    <text class="th" x="92" y="38">质量属性</text>
    <text class="th" x="324" y="38">刺激源</text>
    <text class="th" x="554" y="38">刺激</text>
    <text class="th" x="744" y="38">工件</text>
    <text class="th" x="925" y="38">环境</text>
    <text class="th" x="1203" y="38">响应</text>
    <text class="th" x="1460" y="38">响应度量</text>

    <text class="attr" x="47" y="116">Availability</text>
    <text class="cell" x="270" y="94"><tspan x="270" dy="0">Heartbeat</tspan><tspan x="270" dy="32">监视器</tspan></text>
    <text class="cell" x="500" y="94"><tspan x="500" dy="0">服务器无</tspan><tspan x="500" dy="32">响应</tspan></text>
    <text class="cell" x="710" y="116">处理器</text>
    <text class="cell" x="900" y="116">正常操作</text>
    <text class="cell" x="1060" y="116">通知操作者继续操作</text>
    <text class="cell" x="1420" y="94"><tspan x="1420" dy="0">没有停机时</tspan><tspan x="1420" dy="32">间</tspan></text>

    <text class="attr" x="36" y="256">Interoperability</text>
    <text class="cell" x="270" y="224"><tspan x="270" dy="0">车辆信息系统</tspan></text>
    <text class="cell" x="500" y="224"><tspan x="500" dy="0">发送当前</tspan><tspan x="500" dy="32">位置</tspan></text>
    <text class="cell" x="710" y="224"><tspan x="710" dy="0">路况监控</tspan><tspan x="710" dy="32">系统</tspan></text>
    <text class="cell" x="890" y="224"><tspan x="890" dy="0">系统运行</tspan><tspan x="890" dy="32">前已知</tspan></text>
    <text class="cell" x="1060" y="208"><tspan x="1060" dy="0">路况监控结合当前位置</tspan><tspan x="1060" dy="32">和 Google 地图上的其</tspan><tspan x="1060" dy="32">他信息，并且进行广播</tspan></text>
    <text class="cell" x="1420" y="208"><tspan x="1420" dy="0">我们的信息</tspan><tspan x="1420" dy="32">在 99.9% 的时</tspan><tspan x="1420" dy="32">间是正确的</tspan></text>

    <text class="attr" x="65" y="386">Modifiability</text>
    <text class="cell" x="270" y="386">开发者</text>
    <text class="cell" x="500" y="356"><tspan x="500" dy="0">希望修改</tspan><tspan x="500" dy="32">UI 界面</tspan></text>
    <text class="cell" x="728" y="386">代码</text>
    <text class="cell" x="900" y="386">设计时</text>
    <text class="cell" x="1060" y="386">进行修改和单元测试</text>
    <text class="cell" x="1420" y="356"><tspan x="1420" dy="0">在 3 个小时</tspan><tspan x="1420" dy="32">内完成</tspan></text>

    <text class="attr" x="63" y="500">Performance</text>
    <text class="cell" x="270" y="500">用户</text>
    <text class="cell" x="500" y="500">发起事务</text>
    <text class="cell" x="728" y="500">系统</text>
    <text class="cell" x="900" y="500">正常操作</text>
    <text class="cell" x="1060" y="500">事务被处理</text>
    <text class="cell" x="1420" y="468"><tspan x="1420" dy="0">平均延迟不</tspan><tspan x="1420" dy="32">超过 2 秒</tspan></text>

    <text class="attr" x="82" y="642">Security</text>
    <text class="cell" x="270" y="590"><tspan x="270" dy="0">来自偏远地区</tspan><tspan x="270" dy="32">心怀不满的员</tspan><tspan x="270" dy="32">工</tspan></text>
    <text class="cell" x="500" y="606"><tspan x="500" dy="0">尝试修改</tspan><tspan x="500" dy="32">支付率</tspan></text>
    <text class="cell" x="710" y="606"><tspan x="710" dy="0">系统内数</tspan><tspan x="710" dy="32">据</tspan></text>
    <text class="cell" x="900" y="642">正常操作</text>
    <text class="cell" x="1060" y="642">系统存储修改追踪</text>
    <text class="cell" x="1420" y="574"><tspan x="1420" dy="0">正确数据在 1</tspan><tspan x="1420" dy="32">天内被存储</tspan><tspan x="1420" dy="32">并且进行篡</tspan><tspan x="1420" dy="32">改身份识别</tspan></text>

    <text class="attr" x="72" y="788">Testability</text>
    <text class="cell" x="270" y="788">单元测试者</text>
    <text class="cell" x="500" y="756"><tspan x="500" dy="0">单元测试</tspan><tspan x="500" dy="32">完成</tspan></text>
    <text class="cell" x="710" y="756"><tspan x="710" dy="0">单元测试</tspan><tspan x="710" dy="32">代码</tspan></text>
    <text class="cell" x="900" y="788">开发时</text>
    <text class="cell" x="1060" y="788">记录结果</text>
    <text class="cell" x="1420" y="748"><tspan x="1420" dy="0">3 小时内达到</tspan><tspan x="1420" dy="32">85% 的路径覆</tspan><tspan x="1420" dy="32">盖</tspan></text>

    <text class="attr" x="82" y="902">Usability</text>
    <text class="cell" x="270" y="902">用户</text>
    <text class="cell" x="500" y="870"><tspan x="500" dy="0">下载新应</tspan><tspan x="500" dy="32">用</tspan></text>
    <text class="cell" x="728" y="902">系统</text>
    <text class="cell" x="900" y="902">运行时</text>
    <text class="cell" x="1060" y="902">用户高效地使用应用</text>
    <text class="cell" x="1420" y="870"><tspan x="1420" dy="0">在 2 分钟以</tspan><tspan x="1420" dy="32">内的实验</tspan></text>
  </g>
</svg>
