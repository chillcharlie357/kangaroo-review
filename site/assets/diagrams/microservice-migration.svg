<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Microservice migration design</title>
  <desc id="desc">A monolith decomposed into services with gateway, databases, events, and observability.</desc>
  <rect width="1280" height="720" fill="#fffdf8"/>
  <text x="68" y="82" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#1f2328">Microservices: do not only define, explain the design consequences</text>
  <text x="68" y="120" font-family="Avenir Next,Arial,sans-serif" font-size="18" fill="#667078">综合答题骨架（非单页 PPT 原图）：覆盖拆分边界、独立部署、数据自治、轻量通信、可观测性和分布式代价。</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#355f91"/>
    </marker>
  </defs>
  <g font-family="Avenir Next,Arial,sans-serif">
    <rect x="78" y="215" width="260" height="260" fill="#ffffff" stroke="#b54634" stroke-width="3"/>
    <text x="118" y="255" font-size="24" font-weight="700" fill="#b54634">Monolith</text>
    <text x="112" y="305" font-size="18" fill="#1f2328">UI + Order + Payment</text>
    <text x="112" y="334" font-size="18" fill="#1f2328">+ Inventory + Reporting</text>
    <rect x="132" y="374" width="150" height="54" fill="#f0eadf" stroke="#d9d2c4"/>
    <text x="155" y="408" font-size="18" fill="#1f2328">Shared DB</text>

    <rect x="480" y="176" width="170" height="72" fill="#ffffff" stroke="#1f2328" stroke-width="3"/>
    <text x="510" y="220" font-size="20" font-weight="700" fill="#1f2328">API Gateway</text>
    <rect x="462" y="300" width="175" height="84" fill="#ffffff" stroke="#355f91" stroke-width="3"/>
    <text x="497" y="335" font-size="20" font-weight="700" fill="#355f91">Order</text>
    <text x="498" y="363" font-size="15" fill="#667078">owns order DB</text>
    <rect x="684" y="300" width="175" height="84" fill="#ffffff" stroke="#14756f" stroke-width="3"/>
    <text x="718" y="335" font-size="20" font-weight="700" fill="#14756f">Payment</text>
    <text x="719" y="363" font-size="15" fill="#667078">owns payment DB</text>
    <rect x="906" y="300" width="175" height="84" fill="#ffffff" stroke="#4e7348" stroke-width="3"/>
    <text x="938" y="335" font-size="20" font-weight="700" fill="#4e7348">Inventory</text>
    <text x="939" y="363" font-size="15" fill="#667078">owns stock DB</text>
    <rect x="612" y="478" width="310" height="72" fill="#ffffff" stroke="#b8841f" stroke-width="3"/>
    <text x="655" y="522" font-size="20" font-weight="700" fill="#b8841f">Event Bus / Pub-Sub</text>
    <rect x="980" y="478" width="220" height="72" fill="#ffffff" stroke="#667078" stroke-width="3"/>
    <text x="1018" y="522" font-size="20" font-weight="700" fill="#667078">Observability</text>
  </g>
  <path d="M338 345 C390 330 430 238 480 212" fill="none" stroke="#355f91" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M565 248 L550 300" stroke="#355f91" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M594 248 L760 300" stroke="#355f91" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M620 248 L980 300" stroke="#355f91" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M550 384 L690 478" stroke="#355f91" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M772 384 L772 478" stroke="#355f91" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M994 384 L855 478" stroke="#355f91" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M922 514 L980 514" stroke="#355f91" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
