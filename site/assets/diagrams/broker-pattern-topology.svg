<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">Broker architecture pattern topology</title>
  <desc id="desc">Illustrative Broker pattern topology with client proxy, broker, server proxy, server, and registry.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1c5c74"/>
    </marker>
    <style>
      .bg{fill:#fbfaf7}
      .box{fill:#fff;stroke:#c9d1db;stroke-width:2.4;rx:16}
      .broker{fill:#f0f7f9;stroke:#1c5c74;stroke-width:2.6;rx:18}
      .registry{fill:#fff8e9;stroke:#c9952e;stroke-width:2.2;rx:16}
      .title{font:700 32px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2733}
      .sub{font:18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#667386}
      .name{font:700 23px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2733}
      .body{font:17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#536171}
      .small{font:15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#687486}
      .arrow{stroke:#1c5c74;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#9a6a12;stroke-width:3;fill:none;stroke-dasharray:8 7;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1180" height="620"/>
  <text class="title" x="590" y="58" text-anchor="middle">Reference Answer: Broker Architecture Pattern</text>
  <text class="sub" x="590" y="92" text-anchor="middle">Use when distributed clients and servers need location transparency and protocol mediation.</text>

  <g transform="translate(70,255)">
    <rect class="box" width="150" height="90"/>
    <text class="name" x="75" y="36" text-anchor="middle">Client</text>
    <text class="small" x="75" y="64" text-anchor="middle">requester</text>
  </g>
  <path class="arrow" d="M220 300 H300"/>
  <g transform="translate(300,240)">
    <rect class="box" width="170" height="120"/>
    <text class="name" x="85" y="36" text-anchor="middle">Client Proxy</text>
    <text class="body" x="85" y="70" text-anchor="middle">marshalling</text>
    <text class="small" x="85" y="96" text-anchor="middle">hide remote call</text>
  </g>
  <path class="arrow" d="M470 300 H555"/>
  <g transform="translate(555,220)">
    <rect class="broker" width="190" height="160"/>
    <text class="name" x="95" y="40" text-anchor="middle">Broker</text>
    <text class="body" x="95" y="76" text-anchor="middle">lookup</text>
    <text class="body" x="95" y="104" text-anchor="middle">route request</text>
    <text class="small" x="95" y="132" text-anchor="middle">possible bottleneck</text>
  </g>
  <path class="arrow" d="M745 300 H830"/>
  <g transform="translate(830,240)">
    <rect class="box" width="170" height="120"/>
    <text class="name" x="85" y="36" text-anchor="middle">Server Proxy</text>
    <text class="body" x="85" y="70" text-anchor="middle">dispatch</text>
    <text class="small" x="85" y="96" text-anchor="middle">protocol adapter</text>
  </g>
  <path class="arrow" d="M1000 300 H1070"/>
  <g transform="translate(1070,255)">
    <rect class="box" width="90" height="90"/>
    <text class="name" x="45" y="36" text-anchor="middle">Server</text>
    <text class="small" x="45" y="64" text-anchor="middle">service</text>
  </g>
  <g transform="translate(495,440)">
    <rect class="registry" width="310" height="88"/>
    <text class="name" x="155" y="35" text-anchor="middle">Registry / Directory</text>
    <text class="small" x="155" y="62" text-anchor="middle">server registration and discovery</text>
  </g>
  <path class="dash" d="M650 440 V380"/>
  <text class="small" x="590" y="585" text-anchor="middle">How to draw: show client-side proxy, broker, server-side proxy, server, and optional registry; then discuss latency, bottleneck, and single point of failure.</text>
</svg>
