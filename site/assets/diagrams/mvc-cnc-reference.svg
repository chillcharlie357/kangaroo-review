<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">MVC as a component-and-connector style</title>
  <desc id="desc">MVC reference diagram showing components and connectors.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9a6a12"/>
    </marker>
    <style>
      .bg{fill:#fbfaf7}
      .box{fill:#fff;stroke:#c9d1db;stroke-width:2.5;rx:18}
      .model{fill:#f0f7f9;stroke:#1c5c74;stroke-width:2.5;rx:18}
      .title{font:700 32px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2733}
      .sub{font:18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#667386}
      .name{font:700 25px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2733}
      .body{font:18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#536171}
      .small{font:15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#687486}
      .arrow{stroke:#9a6a12;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .blue{stroke:#1c5c74}
    </style>
  </defs>
  <rect class="bg" width="1080" height="620"/>
  <text class="title" x="540" y="58" text-anchor="middle">MVC as Component-and-Connector Style</text>
  <text class="sub" x="540" y="92" text-anchor="middle">Answer focus: runtime components, connectors, and interaction constraints.</text>

  <g transform="translate(90,250)">
    <rect class="box" width="150" height="90"/>
    <text class="name" x="75" y="38" text-anchor="middle">User</text>
    <text class="small" x="75" y="65" text-anchor="middle">input</text>
  </g>
  <g transform="translate(360,145)">
    <rect class="box" width="230" height="105"/>
    <text class="name" x="115" y="38" text-anchor="middle">Controller</text>
    <text class="body" x="115" y="70" text-anchor="middle">handles input</text>
  </g>
  <g transform="translate(725,250)">
    <rect class="box" width="230" height="105"/>
    <text class="name" x="115" y="38" text-anchor="middle">View</text>
    <text class="body" x="115" y="70" text-anchor="middle">renders UI</text>
  </g>
  <g transform="translate(360,405)">
    <rect class="model" width="230" height="105"/>
    <text class="name" x="115" y="38" text-anchor="middle">Model</text>
    <text class="body" x="115" y="70" text-anchor="middle">state and logic</text>
  </g>

  <path class="arrow" d="M240 295 C300 260 320 215 360 198"/>
  <text class="small" x="290" y="240">input event</text>
  <path class="arrow" d="M590 200 C650 220 690 250 725 286"/>
  <text class="small" x="640" y="225">select view</text>
  <path class="arrow blue" d="M475 250 V405"/>
  <text class="small" x="492" y="298">update / query</text>
  <path class="arrow blue" d="M590 458 C700 440 760 390 810 355"/>
  <text class="small" x="685" y="430">notify change</text>
  <path class="arrow" d="M725 315 C600 340 410 335 240 305"/>
  <text class="small" x="470" y="365">display</text>
</svg>
