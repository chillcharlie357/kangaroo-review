<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 720" role="img" aria-labelledby="title desc">
  <title id="title">ATAM phase outputs reference table</title>
  <desc id="desc">Illustrative phase-output reference for ATAM old exam questions.</desc>
  <style>
    .bg{fill:#fbfaf7}
    .head{fill:#9a2f23}
    .phase{fill:#fff;stroke:#c9d1db;stroke-width:2.2;rx:14}
    .phase2{fill:#f3f6fa;stroke:#c9d1db;stroke-width:2.2;rx:14}
    .title{font:700 32px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2733}
    .sub{font:18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#667386}
    .h{font:700 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#fff}
    .name{font:700 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2733}
    .body{font:17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#536171}
    .small{font:15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#687486}
  </style>
  <rect class="bg" width="1320" height="720"/>
  <text class="title" x="660" y="58" text-anchor="middle">Reference: ATAM Phase Outputs</text>
  <text class="sub" x="660" y="92" text-anchor="middle">Historical P2 topic: keep the phase-output skeleton; do not make ATAM the 2026 mainline.</text>

  <rect class="head" x="70" y="135" width="1180" height="54" rx="12"/>
  <text class="h" x="660" y="170" text-anchor="middle">Phase -> Main Participants -> Outputs</text>

  <g transform="translate(70,220)">
    <rect class="phase" width="280" height="330"/>
    <text class="name" x="140" y="38" text-anchor="middle">Phase 0</text>
    <text class="body" x="28" y="80">Preparation / partnership</text>
    <text class="body" x="28" y="122">- evaluation plan</text>
    <text class="body" x="28" y="154">- scope and schedule</text>
    <text class="body" x="28" y="186">- participants and report target</text>
  </g>
  <g transform="translate(370,220)">
    <rect class="phase2" width="280" height="330"/>
    <text class="name" x="140" y="38" text-anchor="middle">Phase 1</text>
    <text class="body" x="28" y="80">Decision makers + architect</text>
    <text class="body" x="28" y="122">- business drivers</text>
    <text class="body" x="28" y="154">- architecture presentation</text>
    <text class="body" x="28" y="186">- utility tree and scenarios</text>
    <text class="body" x="28" y="218">- risks / non-risks</text>
    <text class="body" x="28" y="250">- sensitivity / tradeoff points</text>
  </g>
  <g transform="translate(670,220)">
    <rect class="phase" width="280" height="330"/>
    <text class="name" x="140" y="38" text-anchor="middle">Phase 2</text>
    <text class="body" x="28" y="80">Broader stakeholders</text>
    <text class="body" x="28" y="122">- stakeholder scenarios</text>
    <text class="body" x="28" y="154">- prioritized scenario list</text>
    <text class="body" x="28" y="186">- scenario analysis results</text>
    <text class="body" x="28" y="218">- risk themes</text>
  </g>
  <g transform="translate(970,220)">
    <rect class="phase2" width="280" height="330"/>
    <text class="name" x="140" y="38" text-anchor="middle">Phase 3</text>
    <text class="body" x="28" y="80">Reporting</text>
    <text class="body" x="28" y="122">- final report</text>
    <text class="body" x="28" y="154">- scenarios and analysis</text>
    <text class="body" x="28" y="186">- risks and risk themes</text>
    <text class="body" x="28" y="218">- sensitivity/tradeoff points</text>
  </g>
  <text class="small" x="660" y="635" text-anchor="middle">How to draw: four phase boxes are enough; list outputs inside each phase and mention broader stakeholders in Phase 2.</text>
</svg>
