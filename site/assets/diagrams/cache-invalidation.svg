<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Distributed cache invalidation sequence</title>
  <desc id="desc">A sequence-style diagram for invalidating peer caches after a database update.</desc>
  <rect width="1280" height="720" fill="#fffdf8"/>
  <text x="68" y="82" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#1f2328">Distributed cache update: answer with a sequence</text>
  <text x="68" y="120" font-family="Avenir Next,Arial,sans-serif" font-size="18" fill="#667078">答题辅助图（非原题 Figure 1）：先提交权威状态，再通过 coordinator/broker/pub-sub 让其他缓存失效或重载。</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#355f91"/>
    </marker>
  </defs>
  <g font-family="Avenir Next,Arial,sans-serif">
    <g font-size="19" font-weight="700">
      <rect x="88" y="180" width="150" height="54" fill="#ffffff" stroke="#b54634" stroke-width="3"/><text x="126" y="214" fill="#b54634">Client</text>
      <rect x="312" y="180" width="170" height="54" fill="#ffffff" stroke="#355f91" stroke-width="3"/><text x="347" y="214" fill="#355f91">Service A</text>
      <rect x="562" y="180" width="170" height="54" fill="#ffffff" stroke="#14756f" stroke-width="3"/><text x="594" y="214" fill="#14756f">Database</text>
      <rect x="802" y="180" width="220" height="54" fill="#ffffff" stroke="#b8841f" stroke-width="3"/><text x="830" y="214" fill="#b8841f">Invalidation Bus</text>
      <rect x="1080" y="180" width="150" height="54" fill="#ffffff" stroke="#4e7348" stroke-width="3"/><text x="1104" y="214" fill="#4e7348">Cache 2..N</text>
    </g>
    <g stroke="#d9d2c4" stroke-width="2" stroke-dasharray="8 8">
      <line x1="163" y1="234" x2="163" y2="610"/>
      <line x1="397" y1="234" x2="397" y2="610"/>
      <line x1="647" y1="234" x2="647" y2="610"/>
      <line x1="912" y1="234" x2="912" y2="610"/>
      <line x1="1155" y1="234" x2="1155" y2="610"/>
    </g>
    <g font-size="17" fill="#1f2328">
      <line x1="163" y1="285" x2="397" y2="285" stroke="#355f91" stroke-width="3" marker-end="url(#arrow)"/>
      <text x="190" y="273">1 update state</text>
      <line x1="397" y1="355" x2="647" y2="355" stroke="#355f91" stroke-width="3" marker-end="url(#arrow)"/>
      <text x="430" y="343">2 commit DB transaction</text>
      <line x1="647" y1="425" x2="397" y2="425" stroke="#355f91" stroke-width="3" marker-end="url(#arrow)"/>
      <text x="455" y="414">3 success</text>
      <line x1="397" y1="485" x2="912" y2="485" stroke="#355f91" stroke-width="3" marker-end="url(#arrow)"/>
      <text x="455" y="474">4 publish invalidate(key, version)</text>
      <line x1="912" y1="545" x2="1155" y2="545" stroke="#355f91" stroke-width="3" marker-end="url(#arrow)"/>
      <text x="950" y="534">5 invalidate or reload</text>
    </g>
    <rect x="802" y="590" width="428" height="54" fill="#f0eadf" stroke="#d9d2c4" stroke-width="2"/>
    <text x="826" y="613" font-size="16" fill="#1f2328">Adapters/connectors hide heterogeneous protocols:</text>
    <text x="826" y="635" font-size="16" fill="#1f2328">HTTP, RMI, SOAP, or other middleware.</text>
  </g>
</svg>
