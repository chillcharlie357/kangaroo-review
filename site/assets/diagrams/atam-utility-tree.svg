<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">ASR utility tree</title>
  <desc id="desc">Utility tree with quality attributes, scenarios, and priority tags.</desc>
  <rect width="1280" height="720" fill="#fffdf8"/>
  <text x="68" y="82" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#1f2328">ASR Utility Tree: prioritize quality scenarios</text>
  <text x="68" y="120" font-family="Avenir Next,Arial,sans-serif" font-size="18" fill="#667078">叶子节点常用 H/M/L 表示业务价值与技术难度/风险，优先分析 H/H。</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f2328"/>
    </marker>
  </defs>
  <g font-family="Avenir Next,Arial,sans-serif">
    <rect x="530" y="165" width="220" height="66" fill="#ffffff" stroke="#1f2328" stroke-width="3"/>
    <text x="590" y="207" font-size="22" font-weight="700" fill="#1f2328">Utility</text>
    <rect x="160" y="310" width="225" height="66" fill="#ffffff" stroke="#b54634" stroke-width="3"/>
    <text x="197" y="352" font-size="20" font-weight="700" fill="#b54634">Performance</text>
    <rect x="530" y="310" width="225" height="66" fill="#ffffff" stroke="#355f91" stroke-width="3"/>
    <text x="584" y="352" font-size="20" font-weight="700" fill="#355f91">Availability</text>
    <rect x="895" y="310" width="225" height="66" fill="#ffffff" stroke="#14756f" stroke-width="3"/>
    <text x="942" y="352" font-size="20" font-weight="700" fill="#14756f">Modifiability</text>
    <rect x="80" y="475" width="310" height="96" fill="#f0eadf" stroke="#d9d2c4" stroke-width="2"/>
    <text x="105" y="510" font-size="17" font-weight="700" fill="#1f2328">Checkout response &lt; 2s</text>
    <text x="105" y="540" font-size="17" fill="#b54634">priority: H/H</text>
    <rect x="486" y="475" width="310" height="96" fill="#f0eadf" stroke="#d9d2c4" stroke-width="2"/>
    <text x="511" y="510" font-size="17" font-weight="700" fill="#1f2328">Recover from node crash</text>
    <text x="511" y="540" font-size="17" fill="#355f91">priority: H/M</text>
    <rect x="890" y="475" width="310" height="96" fill="#f0eadf" stroke="#d9d2c4" stroke-width="2"/>
    <text x="915" y="510" font-size="17" font-weight="700" fill="#1f2328">Add payment channel in 3 days</text>
    <text x="915" y="540" font-size="17" fill="#14756f">priority: M/H</text>
  </g>
  <path d="M640 231 L273 310" stroke="#1f2328" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M640 231 L642 310" stroke="#1f2328" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M640 231 L1008 310" stroke="#1f2328" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M273 376 L235 475" stroke="#1f2328" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M642 376 L641 475" stroke="#1f2328" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1008 376 L1045 475" stroke="#1f2328" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
