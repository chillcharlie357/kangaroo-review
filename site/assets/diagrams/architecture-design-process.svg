<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1090" viewBox="0 0 1800 1090" role="img" aria-labelledby="title desc">
  <title id="title">Architecture Design, Documentation, and Evaluation Process</title>
  <desc id="desc">Stakeholders specify ASRs and quality attribute scenarios. ASRs, requirements, constraints, patterns, and tactics feed architecture design. Design yields candidate views, documentation combines chosen views and beyond-view documentation, and architecture evaluation feeds results back to stakeholders and earlier work.</desc>
  <defs>
    <marker id="blackArrow" viewBox="0 0 18 18" markerWidth="18" markerHeight="18" refX="16" refY="9" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M1 1L17 9L1 17Z" fill="#0c0c0c"/>
    </marker>
    <marker id="softArrow" viewBox="0 0 44 44" markerWidth="44" markerHeight="44" refX="40" refY="22" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M2 2L42 22L2 42Z" fill="#d8928d"/>
    </marker>
    <filter id="whiteHalo" x="-20%" y="-20%" width="140%" height="140%">
      <feFlood flood-color="#fff" flood-opacity="0.88"/>
      <feComposite in2="SourceGraphic" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .font { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; }
      .headline { fill: #111; font-size: 36px; font-weight: 800; letter-spacing: .2px; }
      .blue-title { fill: #2f78bd; font-size: 36px; font-weight: 500; }
      .circle-title { fill: #111; font-size: 34px; font-weight: 800; text-anchor: middle; dominant-baseline: middle; }
      .eval-title { fill: #111; font-size: 34px; font-weight: 800; text-anchor: middle; }
      .caption { fill: #2f78bd; font-size: 40px; font-weight: 400; text-anchor: middle; }
      .black-flow { fill: none; stroke: #0c0c0c; stroke-width: 6.5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#blackArrow); }
      .soft-flow { fill: none; stroke: #d8928d; stroke-width: 28; stroke-linecap: butt; stroke-linejoin: miter; marker-end: url(#softArrow); opacity: .72; }
      .circle { fill: #fff; stroke: #0c0c0c; stroke-width: 8; }
      .paper { fill: #dfe6cf; stroke: #111; stroke-width: 3; }
      .paper-line { fill: #fff; stroke: #111; stroke-width: 3; }
      .scenario { fill: #efd486; stroke: #b38d2c; stroke-width: 3; }
    </style>

    <g id="person-red">
      <circle cx="0" cy="0" r="13" fill="#f71919"/>
      <rect x="-9" y="17" width="18" height="66" rx="7" fill="#f71919"/>
      <rect x="-25" y="22" width="13" height="48" rx="5" fill="#f71919"/>
      <rect x="12" y="22" width="13" height="48" rx="5" fill="#f71919"/>
      <rect x="-10" y="78" width="8" height="40" rx="4" fill="#f71919"/>
      <rect x="2" y="78" width="8" height="40" rx="4" fill="#f71919"/>
    </g>
    <g id="person-blue">
      <circle cx="0" cy="0" r="13" fill="#2d7fd1"/>
      <rect x="-9" y="17" width="18" height="66" rx="7" fill="#2d7fd1"/>
      <rect x="-25" y="22" width="13" height="48" rx="5" fill="#2d7fd1"/>
      <rect x="12" y="22" width="13" height="48" rx="5" fill="#2d7fd1"/>
      <rect x="-10" y="78" width="8" height="40" rx="4" fill="#2d7fd1"/>
      <rect x="2" y="78" width="8" height="40" rx="4" fill="#2d7fd1"/>
    </g>
    <g id="person-brown">
      <circle cx="0" cy="0" r="13" fill="#b64a43"/>
      <rect x="-9" y="17" width="18" height="70" rx="7" fill="#b64a43"/>
      <rect x="-25" y="22" width="13" height="50" rx="5" fill="#b64a43"/>
      <rect x="12" y="22" width="13" height="50" rx="5" fill="#b64a43"/>
      <rect x="-10" y="82" width="8" height="43" rx="4" fill="#b64a43"/>
      <rect x="2" y="82" width="8" height="43" rx="4" fill="#b64a43"/>
    </g>
    <g id="mixed-crowd">
      <use href="#person-red" x="-94" y="-34"/>
      <use href="#person-red" x="-32" y="-34"/>
      <use href="#person-red" x="30" y="-34"/>
      <use href="#person-red" x="92" y="-34"/>
      <use href="#person-blue" x="-62" y="22"/>
      <use href="#person-blue" x="0" y="22"/>
      <use href="#person-blue" x="62" y="22"/>
      <use href="#person-blue" x="124" y="22"/>
    </g>
    <g id="stakeholder-row">
      <use href="#person-brown" x="-110" y="-26"/>
      <use href="#person-brown" x="-40" y="-26"/>
      <use href="#person-brown" x="30" y="-26"/>
      <use href="#person-brown" x="100" y="-26"/>
    </g>
  </defs>

  <rect width="1800" height="1090" fill="#fff"/>

  <g class="font">
    <g id="soft-main-flows">
      <path class="soft-flow" d="M330 330C430 380 485 425 535 470"/>
      <path class="soft-flow" d="M760 520C850 575 910 610 995 645"/>
      <path class="soft-flow" d="M1225 750C1310 805 1368 840 1460 865"/>
    </g>

    <g id="black-feedback-flows">
      <path class="black-flow" d="M110 940C70 740 68 440 125 310"/>
      <path class="black-flow" d="M205 360C165 430 168 500 250 550"/>
      <path class="black-flow" d="M295 555C400 535 470 500 520 465"/>
      <path class="black-flow" d="M565 810C540 715 560 615 605 535"/>
      <path class="black-flow" d="M760 250C820 320 815 405 760 450"/>
      <path class="black-flow" d="M775 465C860 410 940 365 1035 325"/>
      <path class="black-flow" d="M1095 390C1170 475 1175 570 1115 630"/>
      <path class="black-flow" d="M1210 680C1295 610 1365 535 1435 430"/>
      <path class="black-flow" d="M1540 585C1575 660 1578 720 1540 780"/>
      <path class="black-flow" d="M1648 535C1688 640 1680 725 1610 805"/>
      <path class="black-flow" d="M268 945C540 938 850 875 1030 735"/>
      <path class="black-flow" d="M268 960C680 1020 1150 980 1460 905"/>
      <path class="black-flow" d="M260 988C620 1085 1170 1078 1530 955"/>
    </g>

    <text class="headline" x="65" y="105">Specifying ASRs</text>
    <text class="blue-title" x="450" y="88">Patterns and tactics</text>
    <text class="blue-title" x="1085" y="80" text-anchor="middle">“Sketches” of candidate views,</text>
    <text class="blue-title" x="1085" y="127" text-anchor="middle">Determined by patterns</text>
    <text class="blue-title" x="1585" y="80" text-anchor="middle">Chosen, combined</text>
    <text class="blue-title" x="1585" y="126" text-anchor="middle">views plus doc'n.</text>
    <text class="blue-title" x="1585" y="172" text-anchor="middle">beyond views</text>

    <g id="asr-circle">
      <circle class="circle" cx="220" cy="280" r="145"/>
      <g transform="translate(204 285) scale(0.82)">
        <use href="#mixed-crowd"/>
      </g>
    </g>

    <g id="pattern-docs" transform="translate(470 136)">
      <rect class="paper" x="0" y="0" width="235" height="132"/>
      <rect class="paper" x="50" y="30" width="235" height="132"/>
      <rect class="paper" x="100" y="62" width="235" height="132"/>
      <rect class="paper-line" x="135" y="87" width="158" height="38"/>
      <rect class="paper-line" x="135" y="143" width="158" height="38"/>
    </g>

    <g id="qas" transform="translate(140 540)">
      <path class="scenario" d="M0 95L160 60L234 92L72 128Z"/>
      <path class="scenario" d="M0 78L160 43L234 75L72 111Z"/>
      <path class="scenario" d="M0 61L160 26L234 58L72 94Z"/>
      <path class="scenario" d="M0 44L160 9L234 41L72 77Z"/>
      <text class="caption" x="117" y="192">Prioritized</text>
      <text class="caption" x="117" y="242">Quality Attribute</text>
      <text class="caption" x="117" y="292">Scenarios</text>
    </g>

    <g id="stakeholders" transform="translate(190 900)">
      <use href="#stakeholder-row"/>
      <text class="caption" x="0" y="170">Stakeholders</text>
    </g>

    <g id="architecture-design">
      <circle class="circle" cx="650" cy="465" r="128"/>
      <text class="circle-title" x="650" y="432">Architecture</text>
      <text class="circle-title" x="650" y="486">design</text>
    </g>

    <g id="requirements" transform="translate(570 660)">
      <path class="scenario" d="M0 95L130 66L195 95L62 124Z"/>
      <path class="scenario" d="M0 78L130 49L195 78L62 107Z"/>
      <path class="scenario" d="M0 61L130 32L195 61L62 90Z"/>
      <path class="scenario" d="M0 44L130 15L195 44L62 73Z"/>
      <rect x="-58" y="150" width="315" height="108" fill="#fff" opacity=".94"/>
      <text class="caption" x="98" y="190">Requirements,</text>
      <text class="caption" x="98" y="240">constraints</text>
    </g>

    <g id="candidate-views" transform="translate(875 145)">
      <rect class="paper" x="0" y="0" width="390" height="270"/>
      <rect class="paper" x="55" y="35" width="390" height="270"/>
      <rect class="paper" x="110" y="80" width="390" height="270"/>
      <rect class="paper-line" x="165" y="122" width="145" height="72"/>
      <rect class="paper-line" x="355" y="122" width="145" height="72"/>
      <rect class="paper-line" x="165" y="235" width="145" height="72"/>
      <rect class="paper-line" x="355" y="235" width="145" height="72"/>
      <line x1="165" y1="146" x2="310" y2="146" stroke="#111" stroke-width="3"/>
      <line x1="355" y1="146" x2="500" y2="146" stroke="#111" stroke-width="3"/>
      <line x1="165" y1="260" x2="310" y2="260" stroke="#111" stroke-width="3"/>
      <line x1="355" y1="260" x2="500" y2="260" stroke="#111" stroke-width="3"/>
      <text x="322" y="232" fill="#b6863d" font-size="18" font-weight="700">test</text>
    </g>

    <g id="documenting">
      <circle class="circle" cx="1110" cy="655" r="128"/>
      <text class="circle-title" x="1110" y="655">Documenting</text>
    </g>

    <g id="chosen-docs" transform="translate(1405 198)">
      <rect class="paper" x="0" y="0" width="260" height="315"/>
      <rect class="paper" x="55" y="42" width="260" height="315"/>
      <rect class="paper" x="108" y="93" width="260" height="315"/>
      <rect class="paper-line" x="158" y="132" width="170" height="92"/>
      <rect class="paper-line" x="158" y="280" width="170" height="92"/>
      <line x1="158" y1="160" x2="328" y2="160" stroke="#111" stroke-width="3"/>
      <line x1="158" y1="308" x2="328" y2="308" stroke="#111" stroke-width="3"/>
    </g>

    <g id="architecture-evaluation">
      <rect x="1330" y="630" width="280" height="132" fill="#fff" opacity=".94"/>
      <text class="eval-title" x="1470" y="692">Architecture</text>
      <text class="eval-title" x="1470" y="738">Evaluation</text>
      <circle class="circle" cx="1548" cy="880" r="130"/>
      <g transform="translate(1530 878) scale(0.78)">
        <use href="#mixed-crowd"/>
      </g>
    </g>
  </g>
</svg>
