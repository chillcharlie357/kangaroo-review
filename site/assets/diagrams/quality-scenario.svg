<svg xmlns="http://www.w3.org/2000/svg" width="1556" height="888" viewBox="0 0 1556 888" role="img" aria-labelledby="title desc">
  <title id="title">Quality attribute scenario examples table</title>
  <desc id="desc">A faithful redraw of the table mapping quality attributes to stimulus source, stimulus, artifact, environment, response, and response measure.</desc>
  <rect width="1556" height="888" fill="#fffefe"/>

  <defs>
    <style>
      .head { font: 700 30px Georgia, "Songti SC", "Noto Serif CJK SC", serif; fill: #f01818; }
      .attr { font: 700 29px Georgia, "Times New Roman", serif; fill: #f01818; }
      .cell { font: 400 28px Georgia, "Songti SC", "Noto Serif CJK SC", serif; fill: #f01818; }
      .small { font-size: 26px; }
      .grid { stroke: #161616; stroke-width: 1.4; fill: none; }
      .shade { fill: #cfcfcf; }
    </style>
  </defs>

  <rect x="27" y="14" width="1503" height="864" fill="#ffffff" stroke="#161616" stroke-width="1.6"/>
  <rect class="shade" x="28" y="60" width="1501" height="91"/>
  <rect class="shade" x="28" y="286" width="1501" height="91"/>
  <rect class="shade" x="28" y="470" width="1501" height="179"/>
  <rect class="shade" x="28" y="788" width="1501" height="89"/>

  <path class="grid" d="M27 60H1530M27 151H1530M27 286H1530M27 377H1530M27 469H1530M27 649H1530M27 787H1530"/>
  <path class="grid" d="M264 14V878M476 14V878M658 14V878M821 14V878M984 14V878M1319 14V878"/>

  <g class="head" text-anchor="middle">
    <text x="145" y="43">质量属性</text>
    <text x="370" y="43">刺激源</text>
    <text x="567" y="43">刺激</text>
    <text x="739" y="43">工件</text>
    <text x="903" y="43">环境</text>
    <text x="1152" y="43">响应</text>
    <text x="1424" y="43">响应度量</text>
  </g>

  <g text-anchor="middle">
    <text class="attr" x="146" y="118">Availability</text>
    <text class="attr" x="146" y="231">Interoperability</text>
    <text class="attr" x="146" y="344">Modifiability</text>
    <text class="attr" x="146" y="436">Performance</text>
    <text class="attr" x="146" y="565">Security</text>
    <text class="attr" x="146" y="733">Testability</text>
    <text class="attr" x="146" y="849">Usability</text>
  </g>

  <g class="cell">
    <text x="283" y="97">
      <tspan x="283" dy="0">Heartbeat 监</tspan>
      <tspan x="283" dy="36">视器</tspan>
    </text>
    <text x="497" y="97">
      <tspan x="497" dy="0">服务器无</tspan>
      <tspan x="497" dy="36">响应</tspan>
    </text>
    <text x="677" y="118">处理器</text>
    <text x="839" y="118">正常操作</text>
    <text x="1003" y="118">通知操作者继续操作</text>
    <text x="1338" y="96">
      <tspan x="1338" dy="0">没有停机时</tspan>
      <tspan x="1338" dy="36">间</tspan>
    </text>

    <text x="283" y="243">车辆信息系统</text>
    <text x="497" y="206">
      <tspan x="497" dy="0">发送当前</tspan>
      <tspan x="497" dy="42">位置</tspan>
    </text>
    <text x="677" y="206">
      <tspan x="677" dy="0">路况监控</tspan>
      <tspan x="677" dy="42">系统</tspan>
    </text>
    <text x="839" y="206">
      <tspan x="839" dy="0">系统运行</tspan>
      <tspan x="839" dy="42">前已知</tspan>
    </text>
    <text x="1003" y="203" class="small">
