      <tspan x="1003" dy="39">和 Google 地图上的其</tspan>
      <tspan x="1003" dy="39">他信息，并且进行广播</tspan>
    </text>
    <text x="1338" y="203" class="small">
      <tspan x="1338" dy="0">我们的信息</tspan>
      <tspan x="1338" dy="39">在 99.9% 的时</tspan>
      <tspan x="1338" dy="39">间是正确的</tspan>
    </text>

    <text x="283" y="344">开发者</text>
    <text x="497" y="323">
      <tspan x="497" dy="0">希望修改</tspan>
      <tspan x="497" dy="42">UI 界面</tspan>
    </text>
    <text x="677" y="344">代码</text>
    <text x="839" y="344">设计时</text>
    <text x="1003" y="344">进行修改和单元测试</text>
    <text x="1338" y="323">
      <tspan x="1338" dy="0">在 3 个小时</tspan>
      <tspan x="1338" dy="42">内完成</tspan>
    </text>

    <text x="283" y="437">用户</text>
    <text x="497" y="437">发起事务</text>
    <text x="677" y="437">系统</text>
    <text x="839" y="437">正常操作</text>
    <text x="1003" y="437">事务被处理</text>
    <text x="1338" y="418">
      <tspan x="1338" dy="0">平均延迟不</tspan>
      <tspan x="1338" dy="42">超过 2 秒</tspan>
    </text>

    <text x="283" y="520">
      <tspan x="283" dy="0">来自偏远地区</tspan>
      <tspan x="283" dy="43">心怀不满的员</tspan>
      <tspan x="283" dy="43">工</tspan>
    </text>
    <text x="497" y="541">
      <tspan x="497" dy="0">尝试修改</tspan>
      <tspan x="497" dy="43">支付率</tspan>
    </text>
    <text x="677" y="541">
      <tspan x="677" dy="0">系统内数</tspan>
      <tspan x="677" dy="43">据</tspan>
    </text>
    <text x="839" y="566">正常操作</text>
    <text x="1003" y="566">系统存储修改追踪</text>
    <text x="1338" y="498" class="small">
      <tspan x="1338" dy="0">正确数据在 1</tspan>
      <tspan x="1338" dy="39">天内被存储</tspan>
      <tspan x="1338" dy="39">并且进行篡</tspan>
      <tspan x="1338" dy="39">改身份识别</tspan>
    </text>

    <text x="283" y="731">单元测试者</text>
    <text x="497" y="704">
      <tspan x="497" dy="0">单元测试</tspan>
      <tspan x="497" dy="42">完成</tspan>
    </text>
    <text x="677" y="704">
      <tspan x="677" dy="0">单元测试</tspan>
      <tspan x="677" dy="42">代码</tspan>
    </text>
    <text x="839" y="731">开发时</text>
    <text x="1003" y="731">记录结果</text>
    <text x="1338" y="686">
      <tspan x="1338" dy="0">3 小时内达到</tspan>
      <tspan x="1338" dy="42">85%的路径覆</tspan>
      <tspan x="1338" dy="42">盖</tspan>
    </text>

    <text x="283" y="850">用户</text>
    <text x="497" y="831">
      <tspan x="497" dy="0">下载新应</tspan>
      <tspan x="497" dy="42">用</tspan>
    </text>
    <text x="677" y="850">系统</text>
    <text x="839" y="850">运行时</text>
    <text x="1003" y="850">用户高效地使用应用</text>
    <text x="1338" y="830">
      <tspan x="1338" dy="0">在 2 分钟以</tspan>
      <tspan x="1338" dy="42">内的实验</tspan>
    </text>
  </g>
</svg>
